name: 🚀 Deploy to Beget

on:
  push:
    branches:
      - main  # Cambia a 'master' si tu rama principal se llama así

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build Astro + Deploy to Beget

    steps:
      # 1. Descargar el código
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: 📦 Install dependencies
        run: npm ci

      # 4. Compilar Astro en modo estático
      - name: 🔨 Build Astro (SSG)
        run: npm run build
        env:
          WOOCOMMERCE_KEY: ${{ secrets.WOOCOMMERCE_KEY }}
          WOOCOMMERCE_SECRET: ${{ secrets.WOOCOMMERCE_SECRET }}
          WOO_URL: ${{ secrets.WOO_URL }}

      # 5. Desplegar al servidor Beget via rsync sobre SSH
      - name: 🚀 Deploy to Beget via SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.htaccess'
          path: dist/
          remote_path: ${{ secrets.BEGET_PATH }}
          remote_host: ${{ secrets.BEGET_HOST }}
          remote_user: ${{ secrets.BEGET_USER }}
          remote_key: ${{ secrets.BEGET_SSH_KEY }}
